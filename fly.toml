# fly.toml configuration for n8n deployment
app = 'onewayservice'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"

[env]
  N8N_HOST = 'onewayservice.fly.dev'
  N8N_PROTOCOL = 'https'
  N8N_PORT = '5678'
  N8N_LISTEN_ADDRESS = '0.0.0.0'
  NODE_ENV = 'production'
  WEBHOOK_URL = 'https://onewayservice.fly.dev'
  GENERIC_TIMEZONE = 'Europe/Amsterdam'

[[mounts]]
  source = 'n8n_vol'
  destination = '/home/node/.n8n'

[http_service]
  internal_port = 5678
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz"
    protocol = "http"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
