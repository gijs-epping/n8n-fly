name: Build n8n Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 16
      uses: actions/setup-node@v3
      with:
        node-version: '16.x'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build
      run: npm run build
    
    - name: Create package
      run: npm pack
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: n8n-nodes-n8nergonode
        path: n8n-nodes-n8nergonode-*.tgz
