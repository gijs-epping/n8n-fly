pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Write temp files to /tmp
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    sendfile on;
    keepalive_timeout 65;
    
    # Access and error logs to stdout/stderr for Docker
    access_log /dev/stdout;
    error_log /dev/stderr;

    server {
        listen 80;
        
        # Serve n8n on root path
        location / {
            proxy_pass http://localhost:5678;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }

        # Serve React frontend on /frontend/
        location /frontend/ {
            alias /usr/share/nginx/frontend/;
            index index.html;
            try_files $uri $uri/ /frontend/index.html;
            
            # Add proper MIME type handling
            include /etc/nginx/mime.types;
            types {
                application/javascript js;
                text/css css;
                application/json json;
            }
            
            # Handle static files
            location ~ ^/frontend/static/(js|css|media)/(.+)$ {
                alias /usr/share/nginx/frontend/static/$1/$2;
                add_header Cache-Control "public, max-age=31536000";
                try_files $uri =404;
            }

            # Cache control headers for non-static files
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires 0;
        }
    }
}
